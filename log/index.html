<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator Logs</title>
  <style>
    :root {
      color-scheme: light;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f8fb;
      color: #1f2937;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    .btn {
      border: 1px solid #d1d5db;
      background: #fff;
      color: #111827;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      text-decoration: none;
      font-size: 14px;
    }

    .btn:hover {
      background: #f3f4f6;
    }

    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      border-bottom: 1px solid #f1f5f9;
      padding: 10px 12px;
      text-align: left;
      font-size: 14px;
      white-space: nowrap;
    }

    th {
      background: #f8fafc;
      color: #334155;
      font-weight: 600;
    }

    .status {
      margin: 10px 2px 0;
      color: #64748b;
      font-size: 13px;
    }

    @media (max-width: 720px) {
      .card {
        overflow-x: auto;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Calculator Logs</h1>
      <div class="actions">
        <a class="btn" href="/">계산기로 이동</a>
        <a class="btn" href="/api/logs" target="_blank" rel="noreferrer">JSON 보기</a>
        <button id="refreshBtn" class="btn">새로고침</button>
      </div>
    </div>

    <div class="card">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Time</th>
            <th>A</th>
            <th>B</th>
            <th>Op</th>
            <th>Result</th>
            <th>Error</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>

    <p id="status" class="status">불러오는 중...</p>
  </div>

  <script>
    async function loadLogs() {
      const rowsEl = document.getElementById("rows");
      const statusEl = document.getElementById("status");

      statusEl.textContent = "불러오는 중...";
      rowsEl.innerHTML = "";

      try {
        const res = await fetch("/api/logs?limit=100");
        const data = await res.json();

        if (!res.ok || !Array.isArray(data)) {
          statusEl.textContent = "로그를 불러오지 못했습니다.";
          return;
        }

        if (data.length === 0) {
          statusEl.textContent = "아직 로그가 없습니다. 계산기에서 Submit을 눌러보세요.";
          return;
        }

        for (const item of data) {
          const tr = document.createElement("tr");

          const cells = [
            item.id,
            item.ts,
            item.a,
            item.b,
            item.op,
            item.result,
            item.error,
          ];

          for (const value of cells) {
            const td = document.createElement("td");
            td.textContent = value == null ? "" : String(value);
            tr.appendChild(td);
          }

          rowsEl.appendChild(tr);
        }

        statusEl.textContent = `총 ${data.length}개 로그`;
      } catch (error) {
        statusEl.textContent = "네트워크 오류로 로그를 불러오지 못했습니다.";
      }
    }

    document.getElementById("refreshBtn").addEventListener("click", loadLogs);
    loadLogs();
  </script>
</body>
</html>
